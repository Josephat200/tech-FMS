databases:
  - name: tech-fms-db
    databaseName: tech_rica
    user: tech_rica_user
    plan: basic-256mb

services:
  - type: web
    name: tech-fms-backend
    runtime: node
    plan: free
    rootDir: backend
    autoDeploy: true
    healthCheckPath: /api/v1/health
    buildCommand: npm ci && npm run build
    startCommand: npm run migrate && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_PREFIX
        value: /api/v1
      - key: TRUST_PROXY
        value: 1
      - key: CORS_ALLOWED_ORIGINS
        value: https://tech-fms-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_DAYS
        value: 7
      - key: SHUTDOWN_GRACE_PERIOD_MS
        value: 10000
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: true
      - key: DB_HOST
        fromDatabase:
          name: tech-fms-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tech-fms-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: tech-fms-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: tech-fms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tech-fms-db
          property: password
      - key: LOG_LEVEL
        value: info
      - key: API_RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: API_RATE_LIMIT_MAX
        value: 300
      - key: AI_ASSISTANT_MODE
        value: rules
      - key: MFA_ENABLED
        value: true
      - key: MFA_CODE_EXPIRES_MINUTES
        value: 10
      - key: MFA_MAX_ATTEMPTS
        value: 5
      - key: MFA_DEV_BYPASS_CODE
        value: ""

  - type: web
    name: tech-fms-frontend
    runtime: static
    plan: free
    rootDir: frontend
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://tech-fms-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
