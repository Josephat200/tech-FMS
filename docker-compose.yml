services:
  postgres:
    image: postgres:16-alpine
    container_name: techrica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tech_rica}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tech_rica}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: techrica-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api/v1
      TRUST_PROXY: 1
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-REPLACE_WITH_A_STRONG_64_CHAR_SECRET_VALUE}
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 7
      SHUTDOWN_GRACE_PERIOD_MS: 10000
      DB_SSL_REJECT_UNAUTHORIZED: false
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-tech_rica}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "node dist/scripts/migrate.js up && node dist/main.js"]
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: techrica-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  postgres_data:
